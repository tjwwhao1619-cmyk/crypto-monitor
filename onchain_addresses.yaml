# Local on-chain address label examples and audit candidates.
# Active addresses are scanned. Keep them conservative:
# - Active labels require a block explorer explicit label, official docs, or exchange public documentation.
# - Third-party articles, social posts, Lookonchain, and Whale Alert are leads only; they are not enough for high confidence.
# - Uncertain addresses must stay under candidates/TODO and must not be enabled for collection.
# - Exchange active addresses must include source and confidence.
# Placeholder addresses are intentionally skipped by the loader.

ethereum:
  - label: Tether Treasury Ethereum
    entity: Tether
    type: treasury
    address: "0x5754284f345afc66a98fbb0a0afe71e0f007b949"
    assets: [USDT]
    source: "Etherscan labeled address / Tokenview labeled Tether Treasury"
    confidence: high
  - label: Binance Hot Wallet Ethereum
    entity: Binance
    type: exchange
    address: "0x..."
    assets: [USDT, USDC, ETH]
    source: "placeholder"
    confidence: low

tron:
  # TODO: Add Tron Tether Treasury only after Tronscan/Tokenview/official source
  # explicitly labels the address as "Tether Treasury".
  # Candidate TBPxhVAsuzoFnKyXtc1o2UySEydPHgATto is labeled by Tokenview as
  # "Tether MultiSigWallet (TBPx)", not "Tether Treasury"; keep it inactive.
  - label: Tether Treasury Tron
    entity: Tether
    type: treasury
    address: "T..."
    assets: [USDT]
    source: "placeholder"
    confidence: low

solana:
